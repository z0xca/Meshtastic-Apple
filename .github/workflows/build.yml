name: Build IPA

on:
  workflow_dispatch:
    inputs:
      git_ref:
        default: "4af2fbc749bdacc9f08f0bdbfd6f36658923e339"

jobs:
  build-device-unsigned:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref }}
          submodules: recursive

      - run: |
          set -eo pipefail
          xcodebuild \
            -project Meshtastic.xcodeproj \
            -scheme Meshtastic \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "${{ github.workspace }}/build/DerivedData" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - run: |
          APP="${{ github.workspace }}/build/DerivedData/Build/Products/Release-iphoneos/Meshtastic.app"
          test -d "$APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qr gvh.MeshtasticClient-2.3.9.ipa Payload

      - uses: actions/upload-artifact@v7
        with:
          name: meshtastic-2.3.9-ios16-unsigned
          path: gvh.MeshtasticClient-2.3.9.ipa
